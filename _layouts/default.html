<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container inner">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="DeltaZulu OÜ home">
        <picture>
          <source srcset="{{ '/assets/images/logo-light.png' | relative_url }}" media="(prefers-color-scheme: dark)">
          <img src="{{ '/assets/images/logo-dark.png' | relative_url }}" alt="DeltaZulu OÜ logo" class="brand-logo">
        </picture>
        <span>DeltaZulu OÜ</span>
      </a>

      <nav class="top-nav" aria-label="Primary">
        <a href="mailto:info@deltazulu.ee">Email</a>
        <a href="https://github.com/DeltaZulu-OU" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://www.linkedin.com/company/deltazulu" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
  <div class="container footer-inner">
    <span>© {{ 'now' | date: '%Y' }} DeltaZulu OÜ</span>

    <div class="footer-links">
      <a href="mailto:info@deltazulu.ee">info@deltazulu.ee</a>
      <a href="https://github.com/DeltaZulu-OU" target="_blank" rel="noopener noreferrer" aria-label="DeltaZulu OÜ on GitHub">
        <i class="fa fa-github" aria-hidden="true"></i>
      </a>
      <a href="https://www.linkedin.com/company/deltazulu" target="_blank" rel="noopener noreferrer" aria-label="DeltaZulu OÜ on LinkedIn">
        <i class="fa fa-linkedin" aria-hidden="true"></i>
      </a>
    </div>
  </div>
  </footer>
</body>
</html>
